name: hatang_hero
description: "Isang app para sa pag-aaral ng mga bata."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  audioplayers: ^5.2.1
  video_player: ^2.8.1
  google_fonts: ^6.2.1
  flame: ^1.10.0
  flame_audio: ^2.5.3
  shared_preferences: ^2.2.2
  flutter_screenutil: ^5.9.3

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^6.0.0
  flutter_launcher_icons: "^0.13.1"

flutter:
  uses-material-design: true

  # Register your local fonts here correctly
  fonts:
    - family: SourGummy
      fonts:
        - asset: assets/fonts/SourGummy-Regular.ttf
        - asset: assets/fonts/SourGummy-Italic.ttf
          weight: 700

  # Register your assets
  assets:
    - assets/
    - assets/hatanglogo.png
    - assets/audio/
    - assets/vo/
    - assets/images/
    - assets/cave_entrance.png
    - assets/audio/cave_entry.mp3
    - assets/bg.png
    - assets/video/flying_kid.mp4
    - assets/video/on_bedot.mp4
    - assets/video/Hanggang.mp4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/hatanglogo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/hatanglogo.png"